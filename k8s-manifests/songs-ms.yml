---
# Service for songs-ms
apiVersion: v1
kind: Service
metadata:
  name: songs-ms
  namespace: k8s-program
spec:
  type: NodePort
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
  selector:
    app: songs-ms

---
# Deployment for songs-ms
apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-ms
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: songs-ms
  template:
    metadata:
      labels:
        app: songs-ms
    spec:
      containers:
      - name: songs-ms
        image: songs-image:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: SONGS_MS_PORT
          value: "8081"
        - name: SONGS_DB_URL
          value: "songs-db"
        - name: SONGS_DB_PORT
          value: "5432"
        - name: EUREKA_URI
          value: "eureka-server"
        - name: ENABLE_EUREKA_CLIENT
          value: "false"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
