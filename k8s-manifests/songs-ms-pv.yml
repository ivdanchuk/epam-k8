---
# PersistentVolume for songs-ms (Application logs/data)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: songs-ms-pv
  namespace: k8s-program
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  hostPath:
    path: /mnt/data/songs-ms
  persistentVolumeReclaimPolicy: Retain

---
# PersistentVolumeClaim for songs-ms
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: songs-ms-pvc
  namespace: k8s-program
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  volumeName: songs-ms-pv
