---
# Service for resources-ms
apiVersion: v1
kind: Service
metadata:
  name: resources-ms
  namespace: k8s-program
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: resources-ms

---
# Deployment for resources-ms
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resources-ms
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resources-ms
  template:
    metadata:
      labels:
        app: resources-ms
    spec:
      containers:
      - name: resources-ms
        image: resources-image:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: RESOURCES_MS_PORT
          value: "8080"
        - name: RESOURCES_DB_URL
          value: "resources-db"
        - name: RESOURCES_DB_PORT
          value: "5432"
        - name: SONGS_MS_URL
          value: "http://songs-ms:8081"
        - name: EUREKA_URI
          value: "eureka-server"
        - name: ENABLE_EUREKA_CLIENT
          value: "false"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
