---
# Service for eureka-server
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: k8s-program
spec:
  type: NodePort
  ports:
    - port: 8761
      targetPort: 8761
      nodePort: 30761
  selector:
    app: eureka-server

---
# Deployment for eureka-server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: k8s-program
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
      - name: eureka-server
        image: eureka-server-image:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8761
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
